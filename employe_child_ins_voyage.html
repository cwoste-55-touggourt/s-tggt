  <main id="existingContainer" class="w-full hidden z-10 mt-12">

        <p class="text-slate-500 mb-6 font-semibold">إليك قائمة الأبناء الذين قمت بتسجيلهم في رحلات أبناء القطاع.</p>

            </div>

  <main id="formContainer" class="w-full hidden z-10 mt-12">

      <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 mb-6">

              <div class="input-wrapper md:col-span-2">

              </div>

              <div class="input-wrapper">
                  <label class="form-label">تاريخ الميلاد</label>
                  <div class="grid grid-cols-3 gap-2" dir="ltr">
                      <select id="childYear" class="modern-input text-center !px-1" onchange="updateDays('child')"><option value="">السنة</option></select>
                      <select id="childMonth" class="modern-input text-center !px-1" onchange="updateDays('child')"><option value="">الشهر</option></select>
                      <select id="childDay" class="modern-input text-center !px-1" onchange="updateHiddenDate('child')"><option value="">اليوم</option></select>
                  </div>
                  <input type="hidden" id="childBirthDateField">
              </div>

              <div class="input-wrapper">
                  <label class="form-label">الحالة العائلية للطفل</label>
                  <select id="isOrphanField" class="modern-input">

                      <option value="نعم">يتيم (نعم)</option>
                  </select>

                  </select>
              </div>

                  <select id="childDaairaField" class="modern-input" onchange="onChildDaairaChange()">

                  </select>
              </div>

                  <select id="childBaladiyaField" class="modern-input">

                  <label class="form-label">المؤسسة التعليمية</label>
                  <select id="childSchoolField" class="modern-input">
                      <option value="">-- اختر المؤسسة --</option>
                  </select>
              </div>

              </div>

              <div class="input-wrapper md:col-span-2">

                  </select>
              </div>
          </div>
      </div>

    function escapeHtml(str){ return String(str || '').replace(/[&<>"'`=\/]/g, function(s){ return '&#' + s.charCodeAt(0) + ';'; }); }

    function formatCleanDateTime(dateStr) {
        if (!dateStr) return 'غير متوفر';
        try {
            let d = null;
            if (typeof dateStr === 'object' && dateStr.seconds) { d = new Date(dateStr.seconds * 1000); } 
            else if (typeof dateStr === 'string' && dateStr.includes('Timestamp')) { const match = dateStr.match(/seconds=(\d+)/); if (match && match[1]) d = new Date(parseInt(match[1]) * 1000); } 
            else if (typeof dateStr === 'string' && dateStr.includes('ll')) { const parts = dateStr.split('ll'); if (parts.length === 2) return `${parts[1].trim()} ${parts[0].trim()}`; } 
            else if (typeof dateStr === 'string' && /^\d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}$/.test(dateStr.trim())) { const parts = dateStr.trim().split(' '); const dateParts = parts[0].split('-'); return `${dateParts[2]}-${dateParts[1]}-${dateParts[0]} ${parts[1]}`; } 
            else { d = new Date(dateStr); }
            if (d && !isNaN(d.getTime())) {
                const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'); const min = String(d.getMinutes()).padStart(2, '0'); const ss = String(d.getSeconds()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
            }
        } catch(e) {}
        return String(dateStr);
    }

        isOrphan: normalize(raw.isOrphan),

      data.registrationDate = options.registrationDate || raw.date || raw.createdAt || new Date().toISOString();
      data.modificationDate = options.modificationDate || raw.modificationDate || raw.updatedAt || "";
      return data;
    }

   async function checkRegistrationStatus() {

                // 🌟 الأسطر الجديدة لضمان قراءة إعدادات التسجيل المتعدد 🌟
                if(systemConfig.multipleRegistration === undefined) systemConfig.multipleRegistration = false;

    async function authenticateUser() {
        const token = localStorage.getItem('cwoste_auth_token') || sessionStorage.getItem('cwoste_auth_token');
        const role = localStorage.getItem('cwoste_auth_role') || sessionStorage.getItem('cwoste_auth_role');

        if (!token || role !== 'Employee') {
            window.location.href = 'auth_system.html';
            return;
        }

        try {
            const querySnap = await db.collection('compte_cwoste').doc('employee_accounts').collection('users').where('ccp', '==', token).limit(1).get();
            if (querySnap.empty) {
                window.location.href = 'auth_system.html';
                return;
            }
            employeeData = querySnap.docs[0].data();

            if(!employeeData.workDistrict || !employeeData.workMunicipality || !employeeData.phone) {
                Swal.fire({ icon: 'warning', title: 'بيانات غير مكتملة', text: 'يرجى إكمال بيانات دائرة وبلدية العمل ورقم الهاتف في ملفك الشخصي أولاً.', confirmButtonText: 'الذهاب للملف الشخصي', allowOutsideClick: false }).then(() => { window.location.href = 'employee_dashboard.html'; });
                return;
            }

            checkPreviousRegistration(employeeData.empId);

        } catch (error) {
            Swal.fire('خطأ', 'فشل تحميل بيانات الحساب.', 'error').then(() => window.location.href = 'employee_dashboard.html');
        }
    }

    async function checkPreviousRegistration(empId) {

        document.getElementById('existingContainer').classList.add('hidden');
        document.getElementById('formContainer').classList.add('hidden');

        Swal.fire({ title: 'جاري التحقق من سجلاتك...', text: 'لحظات من فضلك', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const beneficiaryParams = new URLSearchParams();
            beneficiaryParams.append("action", "check_previous_beneficiary");
            beneficiaryParams.append("empId", empId);
            beneficiaryParams.append("loanType", "exceptional");

            try {
                const beneficiaryRes = await fetch(scriptURL, { method: "POST", body: beneficiaryParams });
                const beneficiaryResult = await beneficiaryRes.json();
                if (beneficiaryResult.result === "previous_beneficiary") {
                    Swal.fire({
                        title: "⚠️ لا يمكنك التسجيل",
                        html: `أنت مستفيد(ة) من الرحلات السابقة.<br>لا يحقّ للموظف الذي استفاد من رحلات الخدمات الاجتماعية خلال السنة نفسها إعادة التسجيل في البرنامج مرة أخرى.`,
                        icon: "error", confirmButtonText: "عودة", allowOutsideClick: false
                    }).then(() => { window.location.href = 'employee_dashboard.html'; });
                    return;
                }
            } catch(e) {} 

            const params = new URLSearchParams();
            params.append("action", "check_existing");
            params.append("empId", empId);
            params.append("loanType", "exceptional"); 

            const res = await fetch(scriptURL, { method: "POST", body: params });
            const result = await res.json();

            Swal.close();

            if (result.result === "exists" && result.data) {
                registeredChildren = Array.isArray(result.data) ? result.data : [result.data];
                showExistingMenu();
            } else {
                showRegistrationForm();
            }
        } catch (error) {
            Swal.close();
            Swal.fire('خطأ بالخادم', 'تعذر التحقق من سجلاتك. حاول لاحقاً.', 'error').then(() => window.location.href = 'employee_dashboard.html');
        }
    }

    document.getElementById('regPlace').value = employeeData.workplace || '';
    document.getElementById('regDaira').value = employeeData.workDistrict || '';
    document.getElementById('regBaladiya').value = employeeData.workMunicipality || '';
    let p = String(employeeData.phone || '');
    if (p.length === 10 && !p.includes(' ')) p = p.slice(0, 2) + ' ' + p.slice(2, 4) + ' ' + p.slice(4, 6) + ' ' + p.slice(6, 8) + ' ' + p.slice(8, 10);
    document.getElementById('regPhone').value = p;

    initChildSelects();

    document.getElementById('childBirthDateField').value = '';
    document.getElementById('childYear').value = '';
    document.getElementById('childMonth').value = '';
    document.getElementById('childDay').value = '';

    if (isEditMode && childData) {
        document.getElementById('childFullNameField').value = childData.childFullName || '';
        document.getElementById('isOrphanField').value = childData.isOrphan || 'لا';
        
        // فصل الرقم عن النص في المعدل
        let rawGrade = childData.childAge || "";
        let gValue = rawGrade;
        const match = String(rawGrade).match(/^([\d.]+)\s*(?:\((.*)\))?$/);
        if(match) { gValue = match[1]; }
        document.getElementById('childAgeField').value = gValue;

        if(childData.childBirthDate) setDateSelects(childData.childBirthDate, 'child');
        
        // 1. تحديد المستوى أولاً (مع إزالة المسافات الزائدة)
        let levelVal = (childData.category || childData.childLevel || "").trim();
        if (levelVal) {

            if (!Array.from(catField.options).some(o => o.value === levelVal)) {
                catField.innerHTML += `<option value="${levelVal}">${levelVal}</option>`;
            }
            catField.value = levelVal;
        }

        // 2. تحديد الدائرة (مع إزالة المسافات الزائدة)
        let daairaVal = (childData.childDaaira || "").trim();
        if (daairaVal) {
            let dField = document.getElementById('childDaairaField');
            if (!Array.from(dField.options).some(o => o.value === daairaVal)) {
                dField.innerHTML += `<option value="${daairaVal}">${daairaVal}</option>`;
            }
            dField.value = daairaVal;
            
            // 🌟 3. بناء وتجهيز قوائم البلدية والمؤسسات بشكل فوري (بدون تأخير) 🌟
            onChildDaairaChange();

            // 🌟 4. تحديد البلدية مباشرة (مع استثناء الخيار الفارغ) 🌟
            let baladiyaVal = (childData.childBaladiya || "").trim();
            if (baladiyaVal) {
                let bField = document.getElementById('childBaladiyaField');
                let bMatched = Array.from(bField.options).find(o => 
                    o.value !== "" && (o.value === baladiyaVal || o.value.includes(baladiyaVal) || baladiyaVal.includes(o.value))
                );
                
                if (bMatched) {
                    bField.value = bMatched.value;
                } else {
                    bField.innerHTML += `<option value="${baladiyaVal}">${baladiyaVal}</option>`;
                    bField.value = baladiyaVal;
                }
            }

            // 🌟 5. تحديد المؤسسة مباشرة (مع استثناء الخيار الفارغ) 🌟
            let schoolVal = (childData.schoolName || "").trim();
            if (schoolVal) {
                let sField = document.getElementById('childSchoolField');
                let matchedOption = Array.from(sField.options).find(o => 
                    o.value !== "" && (o.value === schoolVal || o.value.includes(schoolVal) || schoolVal.includes(o.value))
                );
                
                if (matchedOption) {
                    sField.value = matchedOption.value;
                } else {
                    sField.innerHTML += `<option value="${schoolVal}">${schoolVal}</option>`;
                    sField.value = schoolVal;
                }
            }
        }

        if(childData.trip) {
            let tField = document.getElementById('tripField');
            if (!Array.from(tField.options).some(o => o.value === childData.trip)) {
                tField.innerHTML += `<option value="${childData.trip}">${childData.trip}</option>`;
            }
            tField.value = childData.trip;
        }
    }

    const ackCheck = document.getElementById('ackCheck');
    ackCheck.checked = false;
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
}

        }

    function validateArabicOnly(input) { input.value = input.value.replace(/[^\u0600-\u06FF\s]/g, ''); }

    function populateDateSelects() {
        const monthsNames = ['جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        let monthsHtml = '<option value="">الشهر</option>';
        monthsNames.forEach((m, i) => { monthsHtml += `<option value="${(i+1).toString().padStart(2,'0')}">${m}</option>`; });
        let yearsHtml = '<option value="">السنة</option>';
        for(let i = 2026; i >= 2005; i--) { yearsHtml += `<option value="${i}">${i}</option>`; } 

        document.getElementById('childMonth').innerHTML = monthsHtml;
        document.getElementById('childYear').innerHTML = yearsHtml;
        updateDays('child');
    }

    function updateDays(type) {
        const yearSelect = document.getElementById(type + 'Year');
        const monthSelect = document.getElementById(type + 'Month');
        const daySelect = document.getElementById(type + 'Day');
        const selectedYear = parseInt(yearSelect.value) || 2024;
        const selectedMonth = parseInt(monthSelect.value) || 1;
        const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
        const currentDay = daySelect.value;
        
        daySelect.innerHTML = '<option value="">اليوم</option>';
        for (let d = 1; d <= daysInMonth; d++) {
            let val = d.toString().padStart(2, '0');
            daySelect.innerHTML += `<option value="${val}">${val}</option>`;
        }
        if (currentDay && currentDay <= daysInMonth) daySelect.value = currentDay;
        updateHiddenDate(type);
    }

    function updateHiddenDate(type) {
        const y = document.getElementById(type + 'Year').value;
        const m = document.getElementById(type + 'Month').value;
        const d = document.getElementById(type + 'Day').value;
        let hiddenField = document.getElementById('childBirthDateField');
        if (y && m && d) { hiddenField.value = `${d}-${m}-${y}`; } else { hiddenField.value = ""; }
    }

    function setDateSelects(dateStr, type) {
        if(!dateStr) return;
        let parts = dateStr.split('-');
        if(parts.length === 3) {
            if(parts[0].length === 4) { 
                document.getElementById(type + 'Year').value = parts[0]; document.getElementById(type + 'Month').value = parts[1]; updateDays(type); document.getElementById(type + 'Day').value = parts[2];
            } else if(parts[2].length === 4) { 
                document.getElementById(type + 'Day').value = parts[0]; document.getElementById(type + 'Month').value = parts[1]; document.getElementById(type + 'Year').value = parts[2]; updateDays(type); document.getElementById(type + 'Day').value = parts[0];
            }
            updateHiddenDate(type);
        }
    }

    function initChildSelects() {
        const daairaSelect = document.getElementById("childDaairaField");
        daairaSelect.innerHTML = '<option value="">-- اختر الدائرة --</option>';
        Object.keys(baladiyaMap).forEach(d => {
            daairaSelect.innerHTML += `<option value="${d}">${d}</option>`;
        });
    }

    function onChildLevelChange() {
        const daaira = document.getElementById("childDaairaField").value;
        if(daaira) onChildDaairaChange();
    }

function onChildDaairaChange() {
        const daaira = document.getElementById("childDaairaField").value;
        const level = document.getElementById("categoryField").value || "";
        const baladiyaSelect = document.getElementById("childBaladiyaField");
        const schoolSelect = document.getElementById("childSchoolField");

        // 1. ملء البلديات
        baladiyaSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
        if (daaira && baladiyaMap[daaira]) {
            baladiyaMap[daaira].forEach(b => { 
                baladiyaSelect.innerHTML += `<option value="${b}">${b}</option>`; 
            });
        }

        // 2. ملء المؤسسات
        schoolSelect.innerHTML = '<option value="">-- اختر المؤسسة --</option>';
        if (daaira) {
            let mappedLevel = "";
            if (level.includes("متوسط")) mappedLevel = "متوسط";
            else if (level.includes("ثانوي")) mappedLevel = "ثانوي";
            else if (level.includes("ابتدائي")) mappedLevel = "ابتدائي";

            // دعم كلتا الصيغتين (النصوص العادية، أو الكائنات التي تحتوي على name)
            const mapObj = window.institutionsByDaaira || {}; 
            
            if (mappedLevel && mapObj[daaira] && mapObj[daaira][mappedLevel]) {
                mapObj[daaira][mappedLevel].forEach(s => { 
                    let sName = typeof s === 'object' ? s.name : s;
                    schoolSelect.innerHTML += `<option value="${sName}">${sName}</option>`; 
                });
            } else if (mapObj[daaira]) {
                for (const lvl in mapObj[daaira]) {
                    mapObj[daaira][lvl].forEach(s => { 
                        let sName = typeof s === 'object' ? s.name : s;
                        schoolSelect.innerHTML += `<option value="${sName}">${sName}</option>`; 
                    });
                }
            }
        }
    }

    // =========================================
    // الإرسال والحذف
    // =========================================
    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const orgText = btn.innerHTML;
        btn.innerHTML = 'جاري الإرسال... <i class="fa-solid fa-spinner fa-spin"></i>';
        btn.disabled = true;

        const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value.trim() : "";
        
        const childName = getVal("childFullNameField");
        const childDate = getVal("childBirthDateField"); 
        const gradeValue = getVal("childAgeField");
        const category = getVal("categoryField"); 
        const childDaaira = getVal("childDaairaField");
        const childBaladiya = getVal("childBaladiyaField");
        const schoolName = getVal("childSchoolField");
        const isOrphan = getVal("isOrphanField");
        const trip = getVal("tripField");

        if(!childName || !childDate || !category || !childDaaira || !childBaladiya || !schoolName || !trip || !gradeValue) {
            Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'جميع الحقول إجبارية.', confirmButtonText: 'موافق' });
            btn.innerHTML = orgText;
            btn.disabled = false;
            return;
        }

        const averageValue = parseFloat(gradeValue);
        if (isNaN(averageValue) || averageValue < 10 || averageValue > 20) {
            Swal.fire({ icon: "warning", title: "تنبيه", text: "يرجى إدخال معدل صحيح بين 10 و 20." });
            btn.innerHTML = orgText;
            btn.disabled = false;
            return;
        }

        // 🌟 دمج المعدل مع النوع النشط من قاعدة البيانات مباشرة 🌟
        const activeType = systemConfig.activeGradeType || 'المعدل';
        const combinedGrade = `${gradeValue} (${activeType})`;

        let cleanPhone = String(employeeData.phone || '').replace(/\D/g, '').slice(0, 10);
        let spacedPhone = cleanPhone.replace(/(\d{2})(?=\d)/g, '$1 ').trim();

        const params = new URLSearchParams();
        params.append("action", isEditMode ? "update" : "register");
        params.append("loanType", "exceptional"); 
        params.append("empId", employeeData.empId);
        params.append("name", employeeData.name);
        params.append("grade", employeeData.grade);
        params.append("place", employeeData.workplace);
        params.append("daira", employeeData.workDistrict);     
        params.append("baladiya", employeeData.workMunicipality); 
        params.append("personalPhone", spacedPhone);
        
        params.append("childFullName", childName);
        params.append("childBirthDate", childDate);
        params.append("childAge", combinedGrade); 
        params.append("category", category); 
        params.append("schoolName", schoolName); 
        params.append("childDaaira", childDaaira); 
        params.append("childBaladiya", childBaladiya);
        params.append("isOrphan", isOrphan);
        params.append("trip", trip); 

        let modDateStr = "";
        if (isEditMode) {
            const now = new Date();
            modDateStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} ll ${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            params.append("modificationDate", modDateStr);
            params.append("originalChildFullName", currentOriginalChildName);
        }

        try {
            const res = await fetch(scriptURL, { method: "POST", body: params });
            const data = await res.json();

            if (data.result === "success") {
                document.getElementById('formContainer').classList.add('hidden');

                let regDateToUse = new Date().toISOString();
                if (isEditMode) {
                    const oldRec = registeredChildren.find(c => c.childFullName === currentOriginalChildName);
                    if (oldRec) regDateToUse = oldRec.date || oldRec.createdAt || regDateToUse;
                } else {
                    regDateToUse = data.date || regDateToUse;
                }

                const submittedData = {
                    empId: employeeData.empId,
                    name: employeeData.name,
                    phone: spacedPhone,
                    childFullName: childName,
                    childBirthDate: childDate,
                    category: category,
                    schoolName: schoolName,
                    childAge: combinedGrade,
                    isOrphan: isOrphan,
                    trip: trip,
                    date: regDateToUse,
                    modificationDate: isEditMode ? modDateStr : ""
                };

                Swal.fire({
                    icon: "success", title: isEditMode ? "تم التحديث" : "تم التسجيل بنجاح",
                    html: `
                        <p class="mb-4 text-sm text-slate-600">تم حفظ بيانات المشارك (${escapeHtml(childName)}) لدى اللجنة بنجاح.</p>
                        <button type="button" id="successReceiptBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            تحميل وصل التسجيل <i class="fa-solid fa-print"></i>
                        </button>
                    `,
                    confirmButtonText: "العودة للقائمة",
                    allowOutsideClick: false,
                    didOpen: () => {
                        document.getElementById('successReceiptBtn').addEventListener('click', () => {
                            openReceiptPreview(submittedData, { actionSource: isEditMode ? "تحديث التسجيل" : "تسجيل جديد" });
                        });
                    }
                }).then(() => checkPreviousRegistration(employeeData.empId)); 
            } else {
                throw new Error(data.message || 'حدث خطأ غير متوقع.');
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'فشل الإرسال', text: err.message });
            btn.innerHTML = orgText;
            btn.disabled = false;
        }
    }

    async function deleteChild(childName) {
        Swal.fire({
            title: "⚠️ تأكيد الحذف", text: `هل أنت متأكد من سحب تسجيل الابن "${childName}" من الرحلات؟`, 
            icon: "warning", showCancelButton: true, confirmButtonText: "نعم، احذف", cancelButtonText: "تراجع", confirmButtonColor: "#dc3545"
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'جاري الإلغاء...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const params = new URLSearchParams();
                    params.append("action", "delete");
                    params.append("empId", employeeData.empId);
                    params.append("loanType", "exceptional");
                    params.append("childFullName", childName);

                    const res = await fetch(scriptURL, { method: "POST", body: params });
                    const data = await res.json();
