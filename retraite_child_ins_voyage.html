    function escapeHtml(str){ return String(str || '').replace(/[&<>"'`=\/]/g, s => '&#' + s.charCodeAt(0) + ';'); }

    function formatPhoneNumber(phone) {
        if (!phone) return '';
        let value = String(phone).replace(/[^\d]/g, '');
        if (value.startsWith('213')) value = '0' + value.slice(3);
        value = value.slice(0, 10);
        if (value.length === 10) return value.slice(0, 2) + ' ' + value.slice(2, 4) + ' ' + value.slice(4, 6) + ' ' + value.slice(6, 8) + ' ' + value.slice(8, 10);
        return value;
    }

    function formatToDayMonthYear(dateStr) {
        if (!dateStr) return '';
        let trimmed = String(dateStr).trim();
        if (trimmed.includes('T')) trimmed = trimmed.split('T')[0];
        const parts = trimmed.split('-');
        if (parts.length === 3) {
            if (parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
            return `${parts[0]}-${parts[1]}-${parts[2]}`;
        }
        return trimmed;
    }

    function formatCleanDateTime(dateStr) {
        if (!dateStr) return 'غير متوفر';
        try {
            let d = null;
            if (typeof dateStr === 'object' && dateStr.seconds) d = new Date(dateStr.seconds * 1000); 
            else if (typeof dateStr === 'string' && dateStr.includes('ll')) { const parts = dateStr.split('ll'); if (parts.length === 2) return `${parts[1].trim()} ${parts[0].trim()}`; } 
            else if (typeof dateStr === 'string' && /^\d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}$/.test(dateStr.trim())) { const parts = dateStr.trim().split(' '); const dateParts = parts[0].split('-'); return `${dateParts[2]}-${dateParts[1]}-${dateParts[0]} ${parts[1]}`; } 
            else d = new Date(dateStr);
            
            if (d && !isNaN(d.getTime())) {
                const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'); const min = String(d.getMinutes()).padStart(2, '0'); const ss = String(d.getSeconds()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
            }
        } catch(e) {}
        return String(dateStr);
    }

      data.registrationDate = options.registrationDate || raw.date || raw.createdAt || new Date().toISOString();
      data.modificationDate = options.modificationDate || raw.modificationDate || raw.updatedAt || "";
      return data;
    }

    async function authenticateUser() {
        const token = localStorage.getItem('cwoste_auth_token') || sessionStorage.getItem('cwoste_auth_token');

        if (!token) {
            window.location.href = 'auth_system.html';
            return;
        }

        try {
            const cachedData = localStorage.getItem('cwoste_user_data') || sessionStorage.getItem('cwoste_user_data');
            
            if (cachedData) {
                employeeData = JSON.parse(cachedData);
            } else {
                // البحث في المسار المعتمد في الداشبورد
                let querySnap = await db.collection('compte_cwoste').doc('retiree_widow_accounts').collection('users').where('ccp', '==', token).limit(1).get();
                
                if (querySnap.empty) {
                    querySnap = await db.collection('compte_cwoste').doc('retiree_widow_accounts').collection('users').where('ccp', '==', Number(token)).limit(1).get();
                }

                if (querySnap.empty) {
                    Swal.fire('خطأ', 'لم يتم العثور على حسابك. يرجى تسجيل الدخول مجدداً.', 'error').then(() => {
                        window.location.href = 'auth_system.html';
                    });
                    return;
                }

                employeeData = querySnap.docs[0].data();
            }

            let targetPhone = employeeData.personalPhone || employeeData.phone || "";
            if(!targetPhone) {
                Swal.fire({ icon: 'warning', title: 'بيانات غير مكتملة', text: 'يرجى إكمال بيانات رقم الهاتف في ملفك الشخصي أولاً.', confirmButtonText: 'الذهاب للملف الشخصي', allowOutsideClick: false }).then(() => { window.location.href = 'retiree_dashboard.html'; });
                return;
            }

            checkPreviousRegistration(targetPhone);

        } catch (error) {
            console.error("Authentication Error: ", error);
            Swal.fire('خطأ', 'فشل تحميل بيانات الحساب.', 'error').then(() => window.location.href = 'retiree_dashboard.html');
        }
    }

        try {
            let cleanPhone = String(phone).replace(/\D/g, '');
            if(cleanPhone.startsWith('213')) cleanPhone = '0' + cleanPhone.slice(3);
            cleanPhone = cleanPhone.slice(0, 10);
            
            const params = new URLSearchParams();
            params.append("action", "check_existing_by_phone");
            params.append("phone", cleanPhone);
            params.append("loanType", "retirees"); 

            const res = await fetch(scriptURL, { method: "POST", body: params });

    function updateDays(type) {
        const yearSelect = document.getElementById(type + 'Year');
        const monthSelect = document.getElementById(type + 'Month');
        const daySelect = document.getElementById(type + 'Day');
        const selectedYear = parseInt(yearSelect.value) || 2024;
        const selectedMonth = parseInt(monthSelect.value) || 1;
        const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
        const currentDay = daySelect.value;
        
        daySelect.innerHTML = '<option value="">اليوم</option>';
        for (let d = 1; d <= daysInMonth; d++) {
            let val = d.toString().padStart(2, '0');
            daySelect.innerHTML += `<option value="${val}">${val}</option>`;
        }
        if (currentDay && currentDay <= daysInMonth) daySelect.value = currentDay;
        updateHiddenDate(type);
    }

    function updateHiddenDate(type) {

        const m = document.getElementById(type + 'Month').value;

    function setDateSelects(dateStr, type) {
        if(!dateStr) return;
        let cleanDate = String(dateStr).split(' ')[0].split('T')[0].trim();
        let parts = cleanDate.split(/[-/]/);
        if(parts.length >= 3) {
            let y, m, d;
            if(parts[0].length === 4) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10); } 
            else { d = parseInt(parts[0], 10); m = parseInt(parts[1], 10); y = parseInt(parts[2], 10); }
            
            document.getElementById(type + 'Year').value = String(y);
            document.getElementById(type + 'Month').value = String(m).padStart(2, '0');
            
            const daySelect = document.getElementById(type + 'Day');
            const daysInMonth = new Date(y, m, 0).getDate();
            daySelect.innerHTML = '<option value="">اليوم</option>';
            for (let i = 1; i <= daysInMonth; i++) {
                let val = String(i).padStart(2, '0');
                daySelect.innerHTML += `<option value="${val}">${val}</option>`;
            }
            
            daySelect.value = String(d).padStart(2, '0');
            updateHiddenDate(type);
        }
    }

            else if (level.includes("ابتدائي")) mappedLevel = "ابتدائي";

            const mapObj = institutionsByDaaira || {}; 
            
            if (mappedLevel && mapObj[daaira] && mapObj[daaira][mappedLevel]) {
                mapObj[daaira][mappedLevel].forEach(s => { 
                    let sName = typeof s === 'object' ? s.name : s;
                    schoolSelect.add(new Option(sName, sName));
                });
            } else if (mapObj[daaira]) {
                for (const lvl in mapObj[daaira]) {
                    mapObj[daaira][lvl].forEach(s => { 
                        let sName = typeof s === 'object' ? s.name : s;
                        schoolSelect.add(new Option(sName, sName));
                    });
                }
            }
        }
    }

    // =========================================
    // دالة إظهار الاستمارة مع أداة التحديد الذكية
    // =========================================
    function showRegistrationForm(isUpdate = false, childData = null) {
        isEditMode = isUpdate;
        document.getElementById('existingContainer').classList.add('hidden');
        document.getElementById('formContainer').classList.remove('hidden');
        
        document.getElementById('formTitle').textContent = isEditMode ? 'تحديث بيانات المشارك' : 'استمارة تسجيل رحلات أبناء القطاع';
        
        const btn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const topBar = document.getElementById('formTopBar');
        
        if(isEditMode) {
            btn.innerHTML = 'حفظ التحديثات <i class="fa-solid fa-floppy-disk"></i>';
            btn.classList.replace('btn-primary', 'btn-success');
            topBar.className = "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-600 via-green-500 to-teal-400";
            cancelBtn.classList.remove('hidden');
        } else {
            btn.innerHTML = 'تأكيد وتسجيل المشارك <i class="fa-solid fa-paper-plane"></i>';
            btn.classList.replace('btn-success', 'btn-primary');
            topBar.className = "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primaryDark via-primary to-accent";
            if (registeredChildren.length > 0) cancelBtn.classList.remove('hidden'); 
            else cancelBtn.classList.add('hidden');
        }

        // 🌟 تعبئة بيانات المتقاعد من الحساب 🌟
        document.getElementById('regLastName').value = employeeData.lastName || employeeData.nom || '';
        document.getElementById('regName').value = employeeData.firstName || employeeData.name || employeeData.prenom || '';
        document.getElementById('regDaira').value = employeeData.residenceDistrict || employeeData.daira || employeeData.district || '';
        document.getElementById('regBaladiya').value = employeeData.residenceMunicipality || employeeData.baladiya || employeeData.municipality || '';
        document.getElementById('regBirthDate').value = formatToDayMonthYear(employeeData.birthDate || employeeData.diz || '');
        document.getElementById('regPhone').value = formatPhoneNumber(employeeData.personalPhone || employeeData.phone || '');

        populateDateSelects();
        initChildSelects();
        // تفريغ وتجهيز الحقول
        document.getElementById('childFullNameField').value = '';
        document.getElementById('childAgeField').value = ''; 
        document.getElementById('childDaairaField').value = '';
        document.getElementById('childBaladiyaField').innerHTML = '<option value="">-- اختر البلدية --</option>';
        document.getElementById('childSchoolField').innerHTML = '<option value="">-- اختر المؤسسة --</option>';
        document.getElementById('categoryField').value = ''; 
        document.getElementById('isOrphanField').value = 'لا';
        document.getElementById('tripField').value = '';
        document.getElementById('childBirthDateField').value = '';
        document.getElementById('childYear').value = '';
        document.getElementById('childMonth').value = '';
        document.getElementById('childDay').value = '';

        // 🌟 الأداة السحرية الجديدة: تضمن اختيار العنصر بأمان وبحث ذكي 🌟
        const safelySelect = (selectId, value) => {
            if (!value) return;
            const selectObj = document.getElementById(selectId);
            const val = String(value).trim();
            if (!val) return;

            let opts = Array.from(selectObj.options);
            
            let match = opts.findIndex(o => o.value !== "" && o.value === val);
            if (match === -1) {
                match = opts.findIndex(o => o.value !== "" && (o.value.includes(val) || val.includes(o.value)));
            }
            if (match === -1) {
                const norm = s => s.replace(/ة/g,'ه').replace(/[أإآ]/g,'ا').replace(/\s+/g,'').replace('و','');
                let cVal = norm(val);
                match = opts.findIndex(o => {
                    if (o.value === "") return false;
                    let cOpt = norm(o.value);
                    return cOpt.includes(cVal) || cVal.includes(cOpt);
                });
            }
            
            if (match !== -1) {
                selectObj.selectedIndex = match;
            } else {
                selectObj.add(new Option(val, val));
                selectObj.selectedIndex = selectObj.options.length - 1;
            }
        };

        if (isEditMode && childData) {
            document.getElementById('childFullNameField').value = childData.childFullName || '';
            
            safelySelect('isOrphanField', childData.isOrphan || 'لا');

            let rawGrade = childData.childAge || "";
            let gValue = rawGrade;
            const match = String(rawGrade).match(/^([\d.]+)\s*(?:\((.*)\))?$/);
            if(match) { gValue = match[1]; }
            document.getElementById('childAgeField').value = gValue;

            if(childData.childBirthDate) setDateSelects(childData.childBirthDate, 'child');
            
            safelySelect('categoryField', childData.category || childData.childLevel);
            safelySelect('childDaairaField', childData.childDaaira);
            
            // بناء قوائم البلديات والمؤسسات بناءً على التحديد السابق
            onChildDaairaChange();

            safelySelect('childBaladiyaField', childData.childBaladiya);
            safelySelect('childSchoolField', childData.schoolName);
            safelySelect('tripField', childData.trip);
        }

        const ackCheck = document.getElementById('ackCheck');
        ackCheck.checked = false;
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
    }

    // =========================================
    // الإرسال والحذف
    // =========================================
    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const orgText = btn.innerHTML;
        btn.innerHTML = 'جاري الإرسال... <i class="fa-solid fa-spinner fa-spin"></i>';
        btn.disabled = true;

        const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value.trim() : "";
        
        const childName = getVal("childFullNameField");
        const childDate = getVal("childBirthDateField"); 
        const gradeValue = getVal("childAgeField");
        const category = getVal("categoryField"); 
        const childDaaira = getVal("childDaairaField");
        const childBaladiya = getVal("childBaladiyaField");
        const schoolName = getVal("childSchoolField");
        const isOrphan = getVal("isOrphanField");
        const trip = getVal("tripField");

        if(!childName || !childDate || !category || !childDaaira || !childBaladiya || !schoolName || !trip || !gradeValue) {
            Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'جميع الحقول إجبارية.', confirmButtonText: 'موافق' });
            btn.innerHTML = orgText;
            btn.disabled = false;
            return;
        }

        const averageValue = parseFloat(gradeValue);
        if (isNaN(averageValue) || averageValue < 10 || averageValue > 20) {
            Swal.fire({ icon: "warning", title: "تنبيه", text: "يرجى إدخال معدل صحيح بين 10 و 20." });
            btn.innerHTML = orgText;
            btn.disabled = false;
            return;
        }

        const activeType = systemConfig.activeGradeType || 'المعدل';
        const combinedGrade = gradeValue;

        // معالجة رقم الهاتف الخاص بالمتقاعد
        let cleanPhone = String(employeeData.personalPhone || employeeData.phone || '').replace(/\D/g, '');
        if(cleanPhone.startsWith('213')) cleanPhone = '0' + cleanPhone.slice(3);
        cleanPhone = cleanPhone.slice(0, 10);
        
        let lastNameVal = getVal("regLastName");
        let nameVal = getVal("regName");
        let dairaVal = getVal("regDaira");
        let baladiyaVal = getVal("regBaladiya");
        let birthDateVal = getVal("regBirthDate");

        const params = new URLSearchParams();
        params.append("action", isEditMode ? "update_by_phone" : "register_by_phone");
        params.append("loanType", "retirees"); 
        params.append("phone", cleanPhone);
        params.append("lastName", lastNameVal);
        params.append("name", nameVal);
        params.append("birthDate", birthDateVal);
        params.append("daira", dairaVal);     
        params.append("baladiya", baladiyaVal); 
        
        params.append("childFullName", childName);
        params.append("childBirthDate", childDate);
        params.append("childAge", combinedGrade); 
        params.append("category", category); 
        params.append("schoolName", schoolName); 
        params.append("childDaaira", childDaaira); 
        params.append("childBaladiya", childBaladiya);
        params.append("isOrphan", isOrphan);
        params.append("trip", trip); 

        let modDateStr = "";
        if (isEditMode) {
            const now = new Date();
            modDateStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} ll ${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            params.append("modificationDate", modDateStr);
            params.append("originalChildFullName", currentOriginalChildName);
        }

        try {
            const res = await fetch(scriptURL, { method: "POST", body: params });
            const data = await res.json();

            if (data.result === "success") {
                document.getElementById('formContainer').classList.add('hidden');

                let regDateToUse = new Date().toISOString();
                if (isEditMode) {
                    const oldRec = registeredChildren.find(c => c.childFullName === currentOriginalChildName);
                    if (oldRec) regDateToUse = oldRec.date || oldRec.createdAt || regDateToUse;
                } else {
                    regDateToUse = data.date || regDateToUse;
                }

                const submittedData = {
                    lastName: lastNameVal,
                    name: nameVal,
                    phone: cleanPhone,
                    childFullName: childName,
                    childBirthDate: childDate,
                    category: category,
                    schoolName: schoolName,
                    childAge: combinedGrade,
                    isOrphan: isOrphan,
                    trip: trip,
                    date: regDateToUse,
                    modificationDate: isEditMode ? modDateStr : ""
                };

                Swal.fire({
                    icon: "success", title: isEditMode ? "تم التحديث" : "تم التسجيل بنجاح",
                    html: `
                        <p class="mb-4 text-sm text-slate-600">تم حفظ بيانات المشارك (${escapeHtml(childName)}) لدى اللجنة بنجاح.</p>
                        <button type="button" id="successReceiptBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            تحميل وصل التسجيل <i class="fa-solid fa-print"></i>
                        </button>
                    `,
                    confirmButtonText: "العودة للقائمة",
                    allowOutsideClick: false,
                    didOpen: () => {
                        document.getElementById('successReceiptBtn').addEventListener('click', () => {
                            openReceiptPreview(submittedData, { actionSource: isEditMode ? "تحديث التسجيل" : "تسجيل جديد" });
                        });
                    }
                }).then(() => checkPreviousRegistration(cleanPhone)); 
            } else {
                throw new Error(data.message || 'حدث خطأ غير متوقع.');
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'فشل الإرسال', text: err.message });
            btn.innerHTML = orgText;
            btn.disabled = false;
        }
    }

    async function deleteChild(childName) {
        Swal.fire({
            title: "⚠️ تأكيد الحذف", text: `هل أنت متأكد من سحب تسجيل الابن "${childName}" من الرحلات؟`, 
            icon: "warning", showCancelButton: true, confirmButtonText: "نعم، احذف", cancelButtonText: "تراجع", confirmButtonColor: "#dc3545"
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'جاري الإلغاء...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let cleanPhone = String(employeeData.personalPhone || employeeData.phone || '').replace(/\D/g, '');
                    if(cleanPhone.startsWith('213')) cleanPhone = '0' + cleanPhone.slice(3);
                    cleanPhone = cleanPhone.slice(0, 10);
                    
                    const params = new URLSearchParams();
                    params.append("action", "delete_by_phone");
                    params.append("phone", cleanPhone);
                    params.append("loanType", "retirees");
                    params.append("childFullName", childName);

                    const res = await fetch(scriptURL, { method: "POST", body: params });
                    const data = await res.json();

                    if (data.result === "success") {
                        Swal.fire({ icon: 'success', title: 'تم الحذف', text: 'تم سحب التسجيل بنجاح.', confirmButtonText: 'العودة' }).then(() => checkPreviousRegistration(cleanPhone));
                    } else {
                        throw new Error(data.message);
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'فشل الحذف.' });
                }
            }
        });
    }
  </script>
