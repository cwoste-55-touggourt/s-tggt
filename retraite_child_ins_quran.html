                      <select id="childMonth" class="modern-input text-center !px-1" onchange="updateDays('child')"><option value="">الشهر</option></select>
                      <select id="childDay" class="modern-input text-center !px-1" onchange="updateHiddenDate('child')"><option value="">اليوم</option></select>

    function escapeHtml(str){ return String(str || '').replace(/[&<>"'`=\/]/g, function(s){ return '&#' + s.charCodeAt(0) + ';'; }); }

    function formatCleanDateTime(dateStr) {
        if (!dateStr) return 'غير متوفر';
        try {
            let d = null;
            if (typeof dateStr === 'object' && dateStr.seconds) {
                d = new Date(dateStr.seconds * 1000);
            } else if (typeof dateStr === 'string' && dateStr.includes('Timestamp')) {
                const match = dateStr.match(/seconds=(\d+)/);
                if (match && match[1]) d = new Date(parseInt(match[1]) * 1000);
            } else if (typeof dateStr === 'string' && dateStr.includes('ll')) {
                const parts = dateStr.split('ll');
                if (parts.length === 2) return `${parts[1].trim()} ${parts[0].trim()}`; 
            } else if (typeof dateStr === 'string' && /^\d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}$/.test(dateStr.trim())) {
                const parts = dateStr.trim().split(' ');
                const dateParts = parts[0].split('-');
                return `${dateParts[2]}-${dateParts[1]}-${dateParts[0]} ${parts[1]}`; 
            } else {
                d = new Date(dateStr);
            }
            if (d && !isNaN(d.getTime())) {
                const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'); const min = String(d.getMinutes()).padStart(2, '0'); const ss = String(d.getSeconds()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
            }
        } catch(e) {}
        return String(dateStr);
    }

    async function authenticateUser() {
        const token = localStorage.getItem('cwoste_auth_token') || sessionStorage.getItem('cwoste_auth_token');
        const role = localStorage.getItem('cwoste_auth_role') || sessionStorage.getItem('cwoste_auth_role');

        if (!token || (role !== 'Retiree' && role !== 'Widow')) {
            window.location.href = 'auth_system.html';
            return;
        }

        try {
            const querySnap = await db.collection('compte_cwoste').doc('retiree_widow_accounts').collection('users').where('ccp', '==', token).limit(1).get();
            if (querySnap.empty) {
                window.location.href = 'auth_system.html';
                return;
            }
            retireeData = querySnap.docs[0].data();

            if(!retireeData.residenceDistrict || !retireeData.residenceMunicipality || !retireeData.phone) {

        const listContainer = document.getElementById('childrenListContainer');
        listContainer.innerHTML = registeredChildren.map((child, index) => `
            <div class="child-card border-primary/20">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-black text-primaryDark text-lg"><i class="fa-solid fa-user-graduate text-accent ml-2"></i>${escapeHtml(child.childFullName)}</h3>
                    <span class="text-xs bg-emerald-100 text-emerald-800 font-bold px-3 py-1 rounded-full border border-emerald-200">مسجل بنجاح</span>
                </div>
                <div class="grid grid-cols-2 gap-2 text-sm text-slate-600 mb-4">
                    <p><b>الطور:</b> ${escapeHtml(child.childLevel)}</p>
                    <p><b>الفئة:</b> ${escapeHtml(child.trip || child.category)}</p>
                    <p><b>المؤسسة:</b> ${escapeHtml(child.schoolName)}</p>
                    <p dir="ltr" class="text-right"><b>تاريخ التسجيل:</b> ${formatCleanDateTime(child.date || child.createdAt)}</p>
                </div>
                <div class="flex flex-wrap gap-2 pt-3 border-t border-slate-200">
                    <button onclick='downloadChildReceipt(${index})' class="btn-info !bg-gradient-to-l !from-primaryDark !to-primary !shadow-primary/30 !w-auto flex-1 !py-2"><i class="fa-solid fa-print"></i> الوصل</button>
                    <button onclick='editSpecificChild(${index})' class="btn-warning !w-auto flex-1 !py-2"><i class="fa-solid fa-pen"></i> تعديل</button>
                    <button onclick='deleteChild("${escapeHtml(child.childFullName)}")' class="btn-danger !w-auto flex-1 !py-2"><i class="fa-solid fa-trash"></i> حذف</button>
                </div>
            </div>
        `).join('');
    }

    function downloadChildReceipt(index) {
        const childData = registeredChildren[index];
        const combinedData = {
            ccp: retireeData.ccp,
            name: `${retireeData.firstName} ${retireeData.lastName}`,
            phone: retireeData.phone,
            ...childData
        };
        openReceiptPreview(combinedData, { actionSource: "استخراج التسجيل السابق" });
    }

    function editSpecificChild(index) {
        const childData = registeredChildren[index];
        currentOriginalChildName = childData.childFullName;
        showRegistrationForm(true, childData);
    }

    function showRegistrationForm(isUpdate = false, childData = null) {
        isEditMode = isUpdate;
        document.getElementById('existingContainer').classList.add('hidden');
        document.getElementById('formContainer').classList.remove('hidden');
        
        document.getElementById('formTitle').textContent = isEditMode ? 'تحديث بيانات المشارك' : 'استمارة تسجيل مسابقة القرآن الكريم';
        
        const btn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const topBar = document.getElementById('formTopBar');
        
        if(isEditMode) {
            btn.innerHTML = 'حفظ التحديثات <i class="fa-solid fa-floppy-disk"></i>';
            btn.classList.replace('btn-primary', 'btn-success');
            topBar.className = "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-600 via-green-500 to-teal-400";
            cancelBtn.classList.remove('hidden');
        } else {
            btn.innerHTML = 'تأكيد وتسجيل المشارك <i class="fa-solid fa-paper-plane"></i>';
            btn.classList.replace('btn-success', 'btn-primary');
            topBar.className = "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primaryDark via-primary to-accent";
            if (registeredChildren.length > 0) cancelBtn.classList.remove('hidden'); 
            else cancelBtn.classList.add('hidden');
        }

        // تعبئة بيانات المتقاعد (للقراءة فقط)
        document.getElementById('regName').value = `${retireeData.firstName || ''} ${retireeData.lastName || ''}`;
        document.getElementById('regCcp').value = retireeData.ccp || '';
        
        // جلب الصفة من التوكن أو من الحقل
        const role = localStorage.getItem('cwoste_auth_role') || sessionStorage.getItem('cwoste_auth_role');
        document.getElementById('regStatus').value = retireeData.status || (role === 'Retiree' ? 'متقاعد(ة)' : 'أرمل(ة)');
        
        document.getElementById('regDaira').value = retireeData.residenceDistrict || '';
        document.getElementById('regBaladiya').value = retireeData.residenceMunicipality || '';
        
        let p = String(retireeData.phone || '');
        if (p.length === 10 && !p.includes(' ')) p = p.slice(0, 2) + ' ' + p.slice(2, 4) + ' ' + p.slice(4, 6) + ' ' + p.slice(6, 8) + ' ' + p.slice(8, 10);
        document.getElementById('regPhone').value = p;

        // تهيئة قوائم التواريخ والمدارس
        populateDateSelects();
        initChildSelects();

        // تفريغ الحقول أولاً
        document.getElementById('childFullNameField').value = '';
        document.getElementById('childAgeField').value = '';
        document.getElementById('childLevelField').value = '';
        document.getElementById('childDaairaField').value = '';
        document.getElementById('childBaladiyaField').innerHTML = '<option value="">-- اختر البلدية --</option>';
        document.getElementById('childSchoolField').innerHTML = '<option value="">-- اختر المؤسسة --</option>';
        document.getElementById('categoryField').value = '';
        document.getElementById('childBirthDateField').value = '';
        document.getElementById('childYear').value = '';
        document.getElementById('childMonth').value = '';
        document.getElementById('childDay').value = '';

        // تعبئة بيانات الابن (في حالة التعديل)
        if (isEditMode && childData) {
            setTimeout(() => {
                document.getElementById('childFullNameField').value = childData.childFullName || '';
                if(childData.childBirthDate) setDateSelects(childData.childBirthDate, 'child');
                
                if(childData.childLevel) {
                    document.getElementById('childLevelField').value = childData.childLevel;
                    updateCategoryBasedOnLevel();
                    
                    if(childData.childDaaira) {
                        document.getElementById('childDaairaField').value = childData.childDaaira;
                        onChildDaairaChange();
                        
                        if(childData.childBaladiya) {
                            document.getElementById('childBaladiyaField').value = childData.childBaladiya;
                            if(childData.childLevel === "ابتدائي") onChildBaladiyaChange();
                        }
                        if(childData.schoolName) {
                            setTimeout(() => { document.getElementById('childSchoolField').value = childData.schoolName; }, 50);
                        }
                    }
                }
                if(childData.trip) document.getElementById('categoryField').value = childData.trip;
            }, 100);
        }

        const ackCheck = document.getElementById('ackCheck');
        ackCheck.checked = false;
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
    }

    function cancelEdit() {
        if (registeredChildren.length > 0) {
            showExistingMenu();
        } else {
            window.location.href = 'retraite_dashboard.html';
        }
    }

    function toggleAck() {
        const check = document.getElementById('ackCheck');
        const btn = document.getElementById('submitBtn');
        check.checked = !check.checked;
        if (check.checked) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        } else {
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
        }
    }

    // =========================================
    // ديناميكية الحقول (التواريخ والمدارس)
    // =========================================
    function validateArabicOnly(input) { input.value = input.value.replace(/[^\u0600-\u06FF\s]/g, ''); }

    function populateDateSelects() {
        const monthsNames = ['جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        let monthsHtml = '<option value="">الشهر</option>';
        monthsNames.forEach((m, i) => { monthsHtml += `<option value="${(i+1).toString().padStart(2,'0')}">${m}</option>`; });
        let yearsHtml = '<option value="">السنة</option>';
        for(let i = 2026; i >= 1900; i--) { yearsHtml += `<option value="${i}">${i}</option>`; }

        document.getElementById('childMonth').innerHTML = monthsHtml;
        document.getElementById('childYear').innerHTML = yearsHtml;
        updateDays('child');
    }

    function updateDays(type) {
        const yearSelect = document.getElementById(type + 'Year');
        const monthSelect = document.getElementById(type + 'Month');
        const daySelect = document.getElementById(type + 'Day');
        const selectedYear = parseInt(yearSelect.value) || 2024;
        const selectedMonth = parseInt(monthSelect.value) || 1;
        const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
        const currentDay = daySelect.value;
        
        daySelect.innerHTML = '<option value="">اليوم</option>';
        for (let d = 1; d <= daysInMonth; d++) {
            let val = d.toString().padStart(2, '0');
            daySelect.innerHTML += `<option value="${val}">${val}</option>`;
        }
        if (currentDay && currentDay <= daysInMonth) daySelect.value = currentDay;
        updateHiddenDate(type);
    }

    function updateHiddenDate(type) {
        const y = document.getElementById(type + 'Year').value;
        const m = document.getElementById(type + 'Month').value;
        const d = document.getElementById(type + 'Day').value;
        let hiddenField = document.getElementById('childBirthDateField');
        
        if (y && m && d) {
            hiddenField.value = `${d}-${m}-${y}`; 
            calculateChildAge();
        } else {
            hiddenField.value = "";
            document.getElementById('childAgeField').value = "";
        }
    }

    function setDateSelects(dateStr, type) {
        if(!dateStr) return;
        let parts = dateStr.split('-');
        if(parts.length === 3) {
            if(parts[0].length === 4) { 
                document.getElementById(type + 'Year').value = parts[0];
                document.getElementById(type + 'Month').value = parts[1];
                updateDays(type);
                document.getElementById(type + 'Day').value = parts[2];
            } else if(parts[2].length === 4) { 
                document.getElementById(type + 'Day').value = parts[0];
                document.getElementById(type + 'Month').value = parts[1];
                document.getElementById(type + 'Year').value = parts[2];
                updateDays(type);
                document.getElementById(type + 'Day').value = parts[0];
            }
            updateHiddenDate(type);
        }
    }

    function calculateChildAge() {
        const birthDateStr = document.getElementById('childBirthDateField').value;
        const ageField = document.getElementById('childAgeField');
        if (!birthDateStr) { ageField.value = ""; return; }
        try {
            const parts = birthDateStr.split('-');
            const birthDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
            ageField.value = age >= 0 ? age + " سنة" : "";
        } catch (error) { ageField.value = ""; }
    }

    function initChildSelects() {
        const daairaSelect = document.getElementById("childDaairaField");
        daairaSelect.innerHTML = '<option value="">-- اختر الدائرة --</option>';
        Object.keys(baladiyaMap).forEach(d => {
            daairaSelect.innerHTML += `<option value="${d}">${d}</option>`;
        });
    }

    function updateCategoryBasedOnLevel() {
        const level = document.getElementById("childLevelField").value;
        const categoryField = document.getElementById("categoryField");
        for (let i = 1; i < categoryField.options.length; i++) categoryField.options[i].disabled = false;

        if (level === "متوسط") {
            categoryField.options[1].disabled = true; 
            if (categoryField.value === "الفئة الأولى (10 أحزاب على الأقل)") categoryField.value = "";
        } else if (level === "ثانوي") {
            categoryField.options[1].disabled = true;
            categoryField.options[2].disabled = true;
            if (categoryField.value === "الفئة الأولى (10 أحزاب على الأقل)" || categoryField.value === "الفئة الثانية (20 حزباً على الأقل)") categoryField.value = "";
        }
    }

    function onChildLevelChange() {
        document.getElementById("childDaairaField").value = "";
        document.getElementById("childBaladiyaField").innerHTML = '<option value="">-- اختر البلدية --</option>';
        document.getElementById("childSchoolField").innerHTML = '<option value="">-- اختر المؤسسة --</option>';
        document.getElementById("categoryField").value = "";
        updateCategoryBasedOnLevel();
    }

    function onChildDaairaChange() {
        const daaira = document.getElementById("childDaairaField").value;
        const level = document.getElementById("childLevelField").value;
        const baladiyaSelect = document.getElementById("childBaladiyaField");
        const schoolSelect = document.getElementById("childSchoolField");

        baladiyaSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
        if (daaira && baladiyaMap[daaira]) {
            baladiyaMap[daaira].forEach(b => { baladiyaSelect.innerHTML += `<option value="${b}">${b}</option>`; });
        }

        schoolSelect.innerHTML = '<option value="">-- اختر المؤسسة --</option>';
        if ((level === "متوسط" || level === "ثانوي") && daaira) {
            if (institutionsByDaaira[daaira] && institutionsByDaaira[daaira][level]) {
                institutionsByDaaira[daaira][level].forEach(s => { schoolSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
            }
        }
    }

    function onChildBaladiyaChange() {
        const baladiya = document.getElementById("childBaladiyaField").value;
        const level = document.getElementById("childLevelField").value;
        const schoolSelect = document.getElementById("childSchoolField");

        if (level === "ابتدائي") {
            schoolSelect.innerHTML = '<option value="">-- اختر المؤسسة --</option>';
            if (baladiya && primarySchoolsByBaladiya[baladiya]) {
                primarySchoolsByBaladiya[baladiya].forEach(s => { schoolSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
            }
        }
    }

    // =========================================
    // الإرسال والحذف
    // =========================================
    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const orgText = btn.innerHTML;
        btn.innerHTML = 'جاري الإرسال... <i class="fa-solid fa-spinner fa-spin"></i>';
        btn.disabled = true;

        const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value.trim() : "";
        
        const childName = getVal("childFullNameField");
        const childDate = getVal("childBirthDateField"); 
        const childAge = getVal("childAgeField").replace(' سنة', '');
        const childLevel = getVal("childLevelField");
        const childDaaira = getVal("childDaairaField");
        const childBaladiya = getVal("childBaladiyaField");
        const schoolName = getVal("childSchoolField");
        const category = getVal("categoryField");

        if(!childName || !childDate || !childLevel || !childDaaira || !childBaladiya || !schoolName || !category) {
            Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'جميع حقول المشارك إجبارية.', confirmButtonText: 'موافق', confirmButtonColor: '#0d9488' });
            btn.innerHTML = orgText;
            btn.disabled = false;
            return;
        }

        let cleanPhone = String(retireeData.phone || '').replace(/\D/g, '').slice(0, 10);
        let bDateRaw = retireeData.birthDate || "01-01-1960"; // احتياطي

        const params = new URLSearchParams();
        params.append("action", isEditMode ? "update_by_phone" : "register_by_phone");
        params.append("loanType", "retirees"); 
        params.append("phone", cleanPhone);
        params.append("lastName", retireeData.lastName);
        params.append("name", retireeData.firstName);
        params.append("birthDate", bDateRaw);
        params.append("daira", retireeData.residenceDistrict);     
        params.append("baladiya", retireeData.residenceMunicipality); 
        
        params.append("childFullName", childName);
        params.append("childBirthDate", childDate);
        params.append("childAge", childAge);
        params.append("trip", category); 
        params.append("schoolName", schoolName); 
        params.append("childLevel", childLevel); 
        params.append("childDaaira", childDaaira); 
        params.append("childBaladiya", childBaladiya);

        let modDateStr = "";
        if (isEditMode) {
            const now = new Date();
            modDateStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} ll ${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            params.append("modificationDate", modDateStr);
            params.append("originalChildFullName", currentOriginalChildName);
        }

        try {
            const res = await fetch(scriptURL, { method: "POST", body: params });
            const data = await res.json();

            if (data.result === "success") {
                document.getElementById('formContainer').classList.add('hidden');

                let regDateToUse = new Date().toISOString();
                if (isEditMode) {
                    const oldRec = registeredChildren.find(c => c.childFullName === currentOriginalChildName);
                    if (oldRec) regDateToUse = oldRec.date || oldRec.createdAt || regDateToUse;
                } else {
                    regDateToUse = data.date || regDateToUse;
                }

                const submittedData = {
                    ccp: retireeData.ccp,
                    name: `${retireeData.firstName} ${retireeData.lastName}`,
                    phone: cleanPhone,
                    childFullName: childName,
                    childBirthDate: childDate,
                    childLevel: childLevel,
                    schoolName: schoolName,
                    category: category,
                    date: regDateToUse,
                    modificationDate: isEditMode ? modDateStr : ""
                };

                Swal.fire({
                    icon: "success", title: isEditMode ? "تم التحديث" : "تم التسجيل بنجاح",
                    html: `
                        <p class="mb-4 text-sm text-slate-600">تم حفظ بيانات المشارك (${escapeHtml(childName)}) لدى اللجنة بنجاح.</p>
                        <button type="button" id="successReceiptBtn" class="w-full bg-primary hover:bg-primaryDark text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            تحميل وصل التسجيل <i class="fa-solid fa-print"></i>
                        </button>
                    `,
                    confirmButtonText: "العودة للقائمة",
                    confirmButtonColor: '#0d9488',
                    allowOutsideClick: false,
                    didOpen: () => {
                        document.getElementById('successReceiptBtn').addEventListener('click', () => {
                            openReceiptPreview(submittedData, { actionSource: isEditMode ? "تحديث التسجيل" : "تسجيل جديد" });
                        });
                    }
                }).then(() => checkPreviousRegistration(retireeData.phone));
            } else {
                throw new Error(data.message || 'حدث خطأ غير متوقع.');
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'فشل الإرسال', text: err.message, confirmButtonColor: '#0d9488' });
            btn.innerHTML = orgText;
            btn.disabled = false;
        }
    }

    async function deleteChild(childName) {
        Swal.fire({
            title: "⚠️ تأكيد الحذف", text: `هل أنت متأكد من سحب تسجيل الابن "${childName}" من المسابقة؟`, 
            icon: "warning", showCancelButton: true, confirmButtonText: "نعم، احذف", cancelButtonText: "تراجع", confirmButtonColor: "#dc3545"
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'جاري الإلغاء...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let cleanPhone = String(retireeData.phone || '').replace(/\D/g, '').slice(0, 10);
                    const params = new URLSearchParams();
                    params.append("action", "delete_by_phone");
                    params.append("phone", cleanPhone);
                    params.append("loanType", "retirees");
                    params.append("childFullName", childName);

                    const res = await fetch(scriptURL, { method: "POST", body: params });
                    const data = await res.json();

                    if (data.result === "success") {
                        Swal.fire({ icon: 'success', title: 'تم الحذف', text: 'تم سحب التسجيل بنجاح.', confirmButtonText: 'العودة', confirmButtonColor: '#0d9488' }).then(() => checkPreviousRegistration(retireeData.phone));
                    } else {
                        throw new Error(data.message);
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'فشل الحذف.', confirmButtonColor: '#0d9488' });
                }
            }
        });
    }
  </script>
